<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Krikett Tippek / Predictions</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: rgb(56, 87, 101);
      color: #f0f0f0;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      position: relative;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      text-shadow: 1px 1px 3px #000;
    }

    #login-container {
      max-width: 400px;
      margin: 0 auto 10px auto;
      padding: 20px;
      background: rgba(0,0,0,0.3);
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
      text-align: center;
    }

    #login-container input {
      padding: 8px;
      margin: 5px;
      width: 80%;
      border-radius: 4px;
      border: none;
      font-size: 16px;
    }

    #login-container button {
      padding: 10px 20px;
      margin-top: 10px;
      border-radius: 5px;
      border: none;
      background-color: #28a745;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
    }

    #login-container button:hover {
      background-color: #218838;
    }

    #login-error {
      color: red;
      margin-top: 8px;
    }

    #footer-links-login {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
      padding: 0 10px;
    }

    #footer-links-login a {
      color: #f0f0f0;
      background: rgba(0,0,0,0.4);
      padding: 6px 12px;
      border-radius: 5px;
      text-decoration: none;
      font-weight: bold;
      box-shadow: 1px 1px 3px #000;
    }

    #footer-links-login a:hover {
      background: rgba(0,0,0,0.6);
    }

    #tips-container {
      max-width: 700px;
      margin: 0 auto;
    }

    .tip {
      background: rgba(0,0,0,0.2);
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    .tip h3, .tip p {
      text-shadow: 1px 1px 2px #000;
    }

    .livestream-button {
      display: inline-block;
      padding: 8px 14px;
      background-color: #007bff;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      font-weight: bold;
      transition: background-color 0.3s ease;
    }

    .livestream-button:hover {
      background-color: #0056b3;
    }

    iframe {
      margin-top: 15px;
      border-radius: 8px;
      width: 100%;
      max-width: 560px;
      height: 315px;
      border: none;
      display: block;
    }
  </style>
</head>
<body>

  <h1>Krikett Tippek/Predictions</h1>

  <div id="login-container">
    <h2>Bejelentkezés</h2>
    <input type="text" id="login-name" placeholder="Név"><br>
    <input type="password" id="login-pass" placeholder="Jelszó"><br>
    <button id="login-btn">Bejelentkezés</button>
    <p id="login-error"></p>

    <!-- ÁSZF és GDPR közvetlenül login alatt -->
    <div id="footer-links-login">
      <a href="aszf.html" target="_blank">ÁSZF</a>
      <a href="gdpr.html" target="_blank">GDPR</a>
    </div>
  </div>

  <div id="tips-container" style="display:none;"></div>

  <script>
    const users = [
      { name: "Mark", password: "Mark123" }
    ];

    const loginContainer = document.getElementById("login-container");
    const tipsContainer = document.getElementById("tips-container");
    const errorP = document.getElementById("login-error");

    function loadTips() {
      fetch("tips.json")
        .then(res => res.json())
        .then(tips => {
          tips.sort((a,b) => new Date(a.start_time) - new Date(b.start_time));
          tipsContainer.innerHTML = "";

          tips.forEach(tip => {
            const div = document.createElement("div");
            div.className = "tip";

            const title = document.createElement("h3");
            title.textContent = `${tip.match} (Győztes: ${tip.winner})`;
            div.appendChild(title);

            const time = document.createElement("p");
            time.textContent = `Kezdés: ${new Date(tip.start_time).toLocaleString("hu-HU")}`;
            div.appendChild(time);

            if(tip.odds){
              const oddsP = document.createElement("p");
              oddsP.textContent = `Odds: ${tip.odds}`;
              oddsP.style.fontWeight = "bold";
              div.appendChild(oddsP);
            }

            const linksDiv = document.createElement("div");
            linksDiv.style.display = "flex";
            linksDiv.style.alignItems = "center";
            linksDiv.style.marginTop = "10px";

            // Bal oldal: ICC/YouTube
            const youtubeId = tip.youtube_id?.trim() || "";
            const iccLink = tip.icc_stream?.trim() || "";
            if (youtubeId) {
              const iframe = document.createElement("iframe");
              iframe.src = `https://www.youtube.com/embed/${youtubeId}`;
              iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture";
              iframe.allowFullscreen = true;
              div.appendChild(iframe);
            } else if (iccLink) {
              const link = document.createElement("a");
              link.href = iccLink;
              link.textContent = "Nézd az ICC streamet";
              link.target = "_blank";
              link.className = "livestream-button";
              linksDiv.appendChild(link);
            }

            // Jobb oldal: Scorecard
            const scoreLink = tip.scorecard?.trim() || "";
            if(scoreLink){
              const scoreLinkEl = document.createElement("a");
              scoreLinkEl.href = scoreLink;
              scoreLinkEl.textContent = "Scorecard";
              scoreLinkEl.target = "_blank";
              scoreLinkEl.className = "livestream-button";
              scoreLinkEl.style.marginLeft = "auto";
              linksDiv.appendChild(scoreLinkEl);
            }

            div.appendChild(linksDiv);
            tipsContainer.appendChild(div);
          });

          tipsContainer.style.display = "block";
        })
        .catch(e => console.error("Hiba a fetch során:", e));
    }

    document.getElementById("login-btn").addEventListener("click", () => {
      const name = document.getElementById("login-name").value.trim();
      const pass = document.getElementById("login-pass").value.trim();

      const user = users.find(u => u.name.toLowerCase() === name.toLowerCase() && u.password === pass);
      if(!user){
        errorP.textContent = "Hibás felhasználónév/jelszó! Jelszóemlékeztetőt kérj DC-n!";
      } else {
        loginContainer.style.display = "none";
        errorP.textContent = "";
        loadTips();
      }
    });

    // ENTER-rel login
    document.getElementById("login-pass").addEventListener("keydown", (e) => {
      if(e.key === "Enter"){
        document.getElementById("login-btn").click();
      }
    });
  </script>
</body>
</html>
