<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Krikett Tippek / Predictions</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: rgb(56, 87, 101);
      color: #f0f0f0;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      position: relative;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      text-shadow: 1px 1px 3px #000;
    }

    #login-container {
      max-width: 400px;
      margin: 0 auto 10px auto;
      padding: 20px;
      background: rgba(0,0,0,0.3);
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
      text-align: center;
    }

    #login-container input {
      padding: 8px;
      margin: 5px;
      width: 80%;
      border-radius: 4px;
      border: none;
      font-size: 16px;
    }

    #login-container button {
      padding: 10px 20px;
      margin-top: 10px;
      border-radius: 5px;
      border: none;
      background-color: #28a745;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
    }

    #login-container button:hover {
      background-color: #218838;
    }

    #login-error {
      color: red;
      margin-top: 8px;
    }

    #footer-links-login {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
      padding: 0 10px;
    }

    #footer-links-login a {
      color: #f0f0f0;
      background: rgba(0,0,0,0.4);
      padding: 6px 12px;
      border-radius: 5px;
      text-decoration: none;
      font-weight: bold;
      box-shadow: 1px 1px 3px #000;
    }

    #footer-links-login a:hover {
      background: rgba(0,0,0,0.6);
    }

    #tips-container {
      max-width: 700px;
      margin: 0 auto;
    }

    .tip {
      background: rgba(0,0,0,0.2);
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    .tip h3, .tip p {
      text-shadow: 1px 1px 2px #000;
    }

    .livestream-button {
      display: inline-block;
      padding: 8px 14px;
      background-color: #007bff;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      font-weight: bold;
      transition: background-color 0.3s ease;
    }

    .livestream-button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>

<h1>Krikett Tippek / Predictions</h1>

<div id="login-container">
  <h2>Bejelentkezés</h2>
  <input type="text" id="login-name" placeholder="Név"><br>
  <input type="password" id="login-pass" placeholder="Jelszó"><br>
  <button id="login-btn">Bejelentkezés</button>
  <p id="login-error"></p>

  <div id="footer-links-login">
    <a href="aszf.html" target="_blank">ÁSZF</a>
    <a href="gdpr.html" target="_blank">GDPR</a>
  </div>
</div>

<div id="tips-container" style="display:none;"></div>

<script>
const users = [
  { name: "Mark", password: "Mark123" }
];

const loginContainer = document.getElementById("login-container");
const tipsContainer = document.getElementById("tips-container");
const errorP = document.getElementById("login-error");

function loadTips() {
  fetch("tips.json")
    .then(res => res.json())
    .then(tips => {

      tips.sort((a,b) => new Date(a.start_time) - new Date(b.start_time));
      tipsContainer.innerHTML = "";

      tips.forEach(tip => {

        const div = document.createElement("div");
        div.className = "tip";

        const title = document.createElement("h3");
        title.textContent = `${tip.match} (Győztes: ${tip.winner})`;
        div.appendChild(title);

        const time = document.createElement("p");
        time.textContent = `Kezdés: ${new Date(tip.start_time).toLocaleString("hu-HU")}`;
        div.appendChild(time);

        if(tip.odds){
          const oddsP = document.createElement("p");
          oddsP.textContent = `Odds: ${tip.odds}`;
          oddsP.style.fontWeight = "bold";
          div.appendChild(oddsP);
        }

        const linksDiv = document.createElement("div");
        linksDiv.style.display = "flex";
        linksDiv.style.alignItems = "center";
        linksDiv.style.marginTop = "10px";

        const youtubeLink = tip.youtube_id?.trim() || "";
        const iccLink = tip.icc_stream?.trim() || "";

        if (youtubeLink) {
          const yt = document.createElement("a");
          yt.href = youtubeLink;
          yt.textContent = "Youtube Stream";
          yt.target = "_blank";
          yt.className = "livestream-button";
          linksDiv.appendChild(yt);
        }

        if (iccLink) {
          const icc = document.createElement("a");
          icc.href = iccLink;
          icc.textContent = "ICC Stream";
          icc.target = "_blank";
          icc.className = "livestream-button";
          icc.style.marginLeft = "10px";
          linksDiv.appendChild(icc);
        }

        const scoreLink = tip.scorecard?.trim() || "";
        if(scoreLink){
          const score = document.createElement("a");
          score.href = scoreLink;
          score.textContent = "Scorecard";
          score.target = "_blank";
          score.className = "livestream-button";
          score.style.marginLeft = "auto";
          linksDiv.appendChild(score);
        }

        div.appendChild(linksDiv);
        tipsContainer.appendChild(div);

      });

      tipsContainer.style.display = "block";
    });
}

document.getElementById("login-btn").addEventListener("click", () => {

  const name = document.getElementById("login-name").value.trim();
  const pass = document.getElementById("login-pass").value.trim();

  const user = users.find(u =>
    u.name.toLowerCase() === name.toLowerCase() &&
    u.password === pass
  );

  if(!user){
    errorP.textContent = "Hibás felhasználónév/jelszó! Jelszóemlékeztetőt kérj DC-n!";
  } else {
    loginContainer.style.display = "none";
    errorP.textContent = "";
    loadTips();
  }
});

document.getElementById("login-pass").addEventListener("keydown", (e) => {
  if(e.key === "Enter"){
    document.getElementById("login-btn").click();
  }
});
</script>

</body>
</html>
