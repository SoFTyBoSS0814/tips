<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cricket Tippek</title>
  <style>
    /* Alap stílusok */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #d0f0fd, #e0f7e9);
      margin: 0;
      padding: 20px;
      color: #333;
    }

    h1 {
      text-align: center;
      margin-bottom: 40px;
      font-size: 2.2em;
      color: #00796b;
    }

    #tips-container {
      max-width: 800px;
      margin: 0 auto;
    }

    /* Tip kártyák */
    .tip {
      background: #ffffff;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 25px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .tip:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.12);
    }

    .tip h3 {
      margin-top: 0;
      font-size: 1.4em;
      color: #004d40;
    }

    .tip p {
      margin: 5px 0;
      font-size: 1.05em;
    }

    /* Odds stílus */
    .tip .odds {
      font-weight: bold;
      color: #388e3c;
    }

    /* Livestream gomb */
    .livestream-button {
      display: inline-block;
      margin-top: 12px;
      padding: 10px 18px;
      background-color: #4db6ac;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      transition: all 0.3s ease;
    }

    .livestream-button:hover {
      background-color: #26a69a;
      transform: scale(1.05);
    }

    /* YouTube iframe */
    iframe {
      margin-top: 15px;
      border-radius: 12px;
      width: 100%;
      max-width: 560px;
      height: 315px;
      border: none;
      display: block;
      box-shadow: 0 3px 12px rgba(0,0,0,0.1);
      transition: transform 0.3s;
    }

    iframe:hover {
      transform: scale(1.02);
    }
  </style>
</head>
<body>
  <h1>Cricket Tippek</h1>
  <div id="tips-container"></div>

  <!-- Csak a login.js script -->
  <script src="login.js" defer></script>
</body>
</html>
