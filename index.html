<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cricket Tippek</title>
  <style>
    /* Alap stílusok */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #a1c4fd, #c2e9fb);
      margin: 0;
      padding: 20px;
      color: #333;
    }

    h1 {
      text-align: center;
      margin-bottom: 40px;
      font-size: 2.5em;
      color: #0d47a1;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
    }

    #tips-container {
      max-width: 800px;
      margin: 0 auto;
    }

    /* Tip kártyák */
    .tip {
      background: linear-gradient(145deg, #ffffff, #e3f2fd);
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 25px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .tip:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.2);
    }

    .tip h3 {
      margin-top: 0;
      font-size: 1.5em;
      color: #0d47a1;
    }

    .tip p {
      margin: 5px 0;
      font-size: 1.1em;
    }

    /* Odds stílus */
    .tip .odds {
      font-weight: bold;
      color: #d32f2f;
    }

    /* Livestream gomb */
    .livestream-button {
      display: inline-block;
      margin-top: 12px;
      padding: 10px 18px;
      background-color: #ff5722;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      transition: all 0.3s ease;
    }

    .livestream-button:hover {
      background-color: #e64a19;
      transform: scale(1.05);
    }

    /* YouTube iframe */
    iframe {
      margin-top: 15px;
      border-radius: 12px;
      width: 100%;
      max-width: 560px;
      height: 315px;
      border: none;
      display: block;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      transition: transform 0.3s;
    }

    iframe:hover {
      transform: scale(1.02);
    }
  </style>
</head>
<body>
  <h1>Cricket Tippek</h1>
  <div id="tips-container"></div>

  <!-- Csak a login.js script -->
  <script src="login.js" defer></script>
  <!-- tips.js NEM hívódik itt, csak a login.js betöltése után -->
</body>
</html>
