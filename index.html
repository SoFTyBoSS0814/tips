<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cricket Tippek</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: rgb(56, 87, 101); /* kellemes, szembarát háttér */
      color: white;
      margin: 0;
      padding: 20px;
    }
    h1 {
      text-align: center;
      margin-bottom: 30px;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
    }
    #tips-container {
      max-width: 700px;
      margin: 0 auto;
    }
    .tip {
      background: rgba(255, 255, 255, 0.05); /* halvány háttér, beleolvad a designba */
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      color: white;
      text-shadow: 0 1px 2px rgba(0,0,0,0.7);
    }
    .tip h3 {
      margin-top: 0;
    }
    .livestream-button {
      display: inline-block;
      margin-top: 12px;
      padding: 8px 14px;
      background-color: #007bff;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      font-weight: bold;
      transition: background-color 0.3s ease;
    }
    .livestream-button:hover {
      background-color: #0056b3;
    }
    iframe {
      margin-top: 15px;
      border-radius: 8px;
      width: 100%;
      max-width: 560px;
      height: 315px;
      border: none;
      display: block;
    }

    /* ÁSZF gomb a jobb alsó sarokba */
    #aszf-button {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      padding: 10px 15px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
      transition: background-color 0.3s ease;
      z-index: 1000;
    }
    #aszf-button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <h1>Cricket Tippek</h1>
  <div id="tips-container"></div>

  <!-- ÁSZF gomb -->
  <button id="aszf-button" onclick="window.open('aszf.html', '_blank')">ÁSZF</button>

  <!-- Csak a login.js betöltése -->
  <script src="login.js" defer></script>
</body>
</html>
