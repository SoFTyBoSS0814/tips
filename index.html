<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cricket Tippek</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }
    h1 {
      text-align: center;
      margin-bottom: 30px;
    }
    #tips-container {
      max-width: 700px;
      margin: 0 auto;
    }
    .tip {
      background: white;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .tip h3 {
      margin-top: 0;
    }
    .livestream-button {
      display: inline-block;
      margin-top: 12px;
      padding: 8px 14px;
      background-color: #007bff;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      font-weight: bold;
      transition: background-color 0.3s ease;
    }
    .livestream-button:hover {
      background-color: #0056b3;
    }
    iframe {
      margin-top: 15px;
      border-radius: 8px;
      width: 100%;
      max-width: 560px;
      height: 315px;
      border: none;
      display: block;
    }
  </style>
</head>
<body>
  <h1>Cricket Tippek</h1>
  <div id="tips-container"></div>

  <!-- LOGIN script -->
  <script src="login.js" defer></script>
  <!-- tips.js NEM hívódik itt, csak a login után -->
</body>
</html>
