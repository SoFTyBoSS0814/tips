<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Krikett Tippek / Predictions</title>

<link rel="stylesheet" href="style.css">

<style>
#login-error{
  font-weight:bold;
  margin-top:10px;
}
#login-error.error{
  color:red;
}
#login-error.success{
  color:green;
}

#trial-info{
  margin-top:10px;
  font-weight:bold;
  color:#FFFF66;
}
#trial-info a{
  color:#FF6600;
  text-decoration:underline;
  font-weight:bold;
}

#countdown{
  font-weight:bold;
  color:#fff;
  background:#FF6600;
  padding:2px 6px;
  border-radius:4px;
  margin-left:5px;
  font-family:monospace;
}
</style>
</head>

<body>

<h1>Krikett Tippek / Predictions</h1>

<div id="login-container">

<h2>Bejelentkezés</h2>

<input type="text" id="login-name" placeholder="Név"><br>
<input type="password" id="login-pass" placeholder="Jelszó"><br>
<button id="login-btn">Bejelentkezés</button>

<p id="login-error"></p>

<p id="trial-info">
1 hetes próbaidőszak: 03.10 - 03.17 között! Discordon találod a logint! 
<a href="https://discord.gg/VunhZFjEUr" target="_blank">https://discord.gg/VunhZFjEUr</a><br>
<span id="countdown">168:00:00</span>
</p>

<div id="footer-links-login">
<a href="aszf.html" target="_blank">ÁSZF</a>
<a href="gdpr.html" target="_blank">GDPR</a>
</div>

</div>

<div id="tips-container" style="display:none;"></div>

<script>

// USERS
const users = [
 { name:"admin", password:"zino" },
 { name:"Mark", password:"Mark123" },
 { name:"demo", password:"demo" },
 { name:"user1", password:"pass", expiry:"2026-03-10T05:46:00" }
];

// DEMO LEJÁRAT
const demoExpiry = new Date("2026-03-17T01:00:00");

// BAN LISTA
const bannedUsers = {
 "BAN":"BANN SZÖVEGE"
};

const loginContainer = document.getElementById("login-container");
const tipsContainer = document.getElementById("tips-container");
const errorP = document.getElementById("login-error");


// LOGIN
document.getElementById("login-btn").addEventListener("click",()=>{

const name=document.getElementById("login-name").value.trim();
const pass=document.getElementById("login-pass").value.trim();
const nameLower=name.toLowerCase();

const userByName=users.find(u=>u.name.toLowerCase()===nameLower);

if(!userByName){
 errorP.textContent="Ilyen felhasználónév nem létezik!";
 errorP.className="error";
 return;
}


// BAN CHECK
if(bannedUsers[nameLower]){
 errorP.textContent=`Fiók letiltva, indok: ${bannedUsers[nameLower]}`;
 errorP.className="error";
 return;
}


// DEMO CHECK
if(userByName.name.toLowerCase()==="demo"){
 const now=new Date();
 if(now>=demoExpiry){
  errorP.textContent="A DEMO felhasználó próbaidőszaka lejárt!";
  errorP.className="error";
  return;
 }
}


// TAGSÁG LEJÁRAT
if(userByName.expiry){
 const expiryDate=new Date(userByName.expiry);
 const now=new Date();

 if(now>=expiryDate){
  errorP.textContent="Lejárt a tagságod! DC-n keresd fel Zinoviyt!";
  errorP.className="error";
  return;
 }
}


// PASSWORD CHECK
if(userByName.password!==pass){
 errorP.textContent="Hibás jelszó!";
 errorP.className="error";
 return;
}


// LOGIN SUCCESS
errorP.textContent="Sikeres bejelentkezés! Betöltés...";
errorP.className="success";

setTimeout(()=>{
 loginContainer.style.display="none";
 loadTips();
},800);

});


// ENTER LOGIN
document.getElementById("login-pass").addEventListener("keydown",e=>{
 if(e.key==="Enter"){
  document.getElementById("login-btn").click();
 }
});



// TIPS BETÖLTÉS
function loadTips(){

fetch("tips.json?v="+new Date().getTime())
.then(res=>res.json())
.then(tips=>{

tips.sort((a,b)=>new Date(a.start_time)-new Date(b.start_time));
tipsContainer.innerHTML="";

tips.forEach(tip=>{

const div=document.createElement("div");
div.className="tip";

const title=document.createElement("h3");
title.textContent=`${tip.match} (Győztes: ${tip.winner})`;
div.appendChild(title);

const time=document.createElement("p");
time.textContent=`Kezdés: ${new Date(tip.start_time).toLocaleString("hu-HU")}`;
div.appendChild(time);

if(tip.odds){
 const odds=document.createElement("p");
 odds.textContent=`Odds: ${tip.odds}`;
 odds.style.fontWeight="bold";
 div.appendChild(odds);
}

const links=document.createElement("div");
links.className="links-row";

if(tip.youtube_id){
 const yt=document.createElement("a");
 yt.href=tip.youtube_id;
 yt.textContent="Youtube Stream";
 yt.target="_blank";
 links.appendChild(yt);
}

if(tip.icc_stream){
 const icc=document.createElement("a");
 icc.href=tip.icc_stream;
 icc.textContent="ICC Stream";
 icc.target="_blank";
 links.appendChild(icc);
}

if(tip.scorecard){
 const score=document.createElement("a");
 score.href=tip.scorecard;
 score.textContent="Scorecard";
 score.target="_blank";
 score.style.marginLeft="auto";
 links.appendChild(score);
}

div.appendChild(links);
tipsContainer.appendChild(div);

});

tipsContainer.style.display="block";

})
.catch(e=>console.log(e));

}



// COUNTDOWN
function startCountdown(){

const startTime=new Date("2026-03-10T01:00:00");
const endTime=new Date("2026-03-17T01:00:00");
const countdown=document.getElementById("countdown");

function update(){

const now=new Date();

if(now<startTime){
 countdown.textContent="Még nem indult";
 return;
}

let diff=endTime-now;

if(diff<=0){
 countdown.textContent="Lejárt a próbaidőszak!";
 return;
}

const h=Math.floor(diff/(1000*60*60));
const m=Math.floor((diff%(1000*60*60))/(1000*60));
const s=Math.floor((diff%(1000*60))/1000);

countdown.textContent=`${h}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;

}

update();
setInterval(update,1000);

}

startCountdown();

</script>

</body>
</html>
