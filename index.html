<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cricket Tippek</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: rgb(56, 87, 101);
      margin: 0;
      padding: 20px;
      color: #f0f0f0;
    }
    h1 {
      text-align: center;
      margin-bottom: 30px;
      text-shadow: 1px 1px 3px #000;
    }
    #tips-container {
      max-width: 700px;
      margin: 0 auto;
    }
    .tip {
      background: rgba(0,0,0,0.3);
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }
    .tip h3 {
      margin-top: 0;
      text-shadow: 1px 1px 2px #000;
    }
    .livestream-button {
      display: inline-block;
      margin-top: 12px;
      padding: 8px 14px;
      background-color: #007bff;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      font-weight: bold;
      transition: background-color 0.3s ease;
    }
    .livestream-button:hover {
      background-color: #0056b3;
    }
    iframe {
      margin-top: 15px;
      border-radius: 8px;
      width: 100%;
      max-width: 560px;
      height: 315px;
      border: none;
      display: block;
    }

    /* FIX BAL-JOBB linkek */
    .fixed-link {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      padding: 12px 18px;
      background-color: #007bff;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      text-align: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.5);
      z-index: 1000;
      transition: background-color 0.3s ease;
    }
    .fixed-link:hover {
      background-color: #0056b3;
    }
    .left-link {
      left: 0;
      border-top-right-radius: 8px;
      border-bottom-right-radius: 8px;
    }
    .right-link {
      right: 0;
      border-top-left-radius: 8px;
      border-bottom-left-radius: 8px;
    }
  </style>
</head>
<body>
  <h1>Cricket Tippek</h1>
  <div id="tips-container"></div>

  <!-- FIX linkek -->
  <a href="aszf.html" class="fixed-link left-link">ÁSZF</a>
  <a href="gdpr.html" class="fixed-link right-link">GDPR</a>

  <!-- Csak a login.js script -->
  <script src="login.js" defer></script>
</body>
</html>
